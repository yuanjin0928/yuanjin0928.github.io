<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }}</title>   <!-- Uses each page's own title -->
  <link rel="stylesheet" href="/assets/style.css">   <!-- The shared style, written once -->
</head>
<body>
  <!-- Navigation bar: appears on every page that uses this layout -->
  <nav>
    <a href="/">Home</a>
    <a href="/blog">Blog</a>
    <a href="/about">About</a>
  </nav>

  {{ content }}   <!-- This is the "hole": each page's content gets poured in here -->
</body>
</html>
