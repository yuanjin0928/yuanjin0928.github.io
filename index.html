---
layout: default
title: Home
---
<!-- Everything the visitor actually sees goes inside <body> -->
<h1>Hi, I'm Jin Yuan</h1>
<p>This is my personal homepage. Work in progress.</p>

<h2>Blog posts</h2>
<ul>
  <!-- Loop over every article in the "blogs" collection -->
  {% for post in site.blogs %}
    <li>
    <!-- post.url is the real URL Jekyll computed; post.title is from front matter -->
      <a href="{{ post.url }}">{{ post.title }}</a>
    </li>
  {% endfor %}
</ul>
