title: Jin Yuan
description: 个人主页 —— 技术与阅读笔记
baseurl: ""
url: "https://yuanjin0928.github.io"

collections:
  blogs:
    output: true
    permalink: /blogs/:path/

# 只给 blogs collection 套 post 布局，避免影响首页等普通页面
defaults:
  - scope:
      path: ""
      type: blogs
    values:
      layout: post

markdown: kramdown
highlighter: rouge

# 排除构建产物 / 本地文件
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - README.md
