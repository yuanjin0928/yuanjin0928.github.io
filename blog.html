---
layout: default
title: Blog
---

<h1>All blog posts</h1>

<!-- Group all posts by their "category" field -->
{% assign groups = site.blogs | group_by: "category" %}

<!-- Loop over each group (each category) -->
{% for group in groups %}
  <h2>{{ group.name }}</h2>        <!-- group.name is the category, e.g. "cpu" -->
  <ul>
    <!-- group.items is the list of posts in this category -->
    {% for post in group.items %}
      <li>
        <a href="{{ post.url }}">{{ post.title }}</a>
      </li>
    {% endfor %}
  </ul>
{% endfor %}
